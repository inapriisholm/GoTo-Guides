<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoTo Guides – find en guide</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#edeae5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GoTo Guides">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    /* 2026: forhøjede neutraler (varm stone) + én rolig teal-accent */
    --bg:#edeae5;          /* warm stone */
    --card:#ffffff;
    --ink:#2c2a28;         /* dyb varm sort, høj kontrast */
    --ink-soft:#6a655f;    /* taupe-grå */
    --line:#e0dcd5;
    --shadow:rgba(44,42,40,.10);

    /* accent: dæmpet teal (erstatter den gule). navne beholdt for nem mapping */
    --honey:#2f7e74;       /* primær accent: deep teal */
    --honey-soft:#d7ebe7;  /* lys teal til fokus/baggrund */
    --honey-ink:#0f3b35;   /* mørk teal til tekst på accent */

    --orange:#bf6a4a;      /* terracotta (advarsler) */
    --orange-soft:#f1ddd2;
    --green:#7f9376;
    --green-deep:#52715f;
    --forest:#34534a;
    --skyblue:#6f9fbf;
    --deepblue:#3a5872;
    --mint:#8fb8b0;        /* sekundær (info-knap) */
    --sand:#d6cfc4;        /* neutral billedbaggrund */

    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  }

  /* ---------- Header ---------- */
  header{
    position:relative;z-index:10;
    background:var(--bg);
    padding:16px 16px 4px;
  }
  .brand{
    display:flex;align-items:center;gap:12px;
    max-width:1100px;margin:0 auto;
  }
  .sticky-controls{
    position:sticky;top:0;z-index:50;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
  }
  .sticky-inner{max-width:1100px;margin:0 auto;}
  .brand-mark{
    width:46px;height:46px;border-radius:14px;flex:none;
    background:var(--honey);
    display:grid;place-items:center;
  }
  .brand-mark svg{width:26px;height:26px;}
  .brand-text h1{
    font-family:'Baloo 2',cursive;font-weight:700;
    font-size:1.4rem;margin:0;line-height:1;color:var(--ink);
    letter-spacing:-.01em;
  }
  .brand-text p{margin:3px 0 0;font-size:.82rem;color:var(--ink-soft);font-weight:600;}

  /* ---------- Multi-select typeahead ---------- */
  .ms-wrap{position:relative;max-width:1100px;margin:0 auto;}
  .ms-control{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    border:1px solid var(--line);background:#fff;border-radius:14px;
    padding:8px 8px 8px 14px;min-height:52px;cursor:text;
    transition:border-color .2s,box-shadow .2s;
  }
  .ms-wrap.open .ms-control,
  .ms-control:focus-within{border-color:var(--honey);box-shadow:0 0 0 3px var(--honey-soft);}
  .ms-ico{width:21px;height:21px;color:var(--ink-soft);flex:none;}
  .ms-tags{display:contents;}
  .ms-tag{
    display:inline-flex;align-items:center;gap:6px;
    border-radius:50px;padding:5px 6px 5px 11px;
    font-size:.86rem;font-weight:800;color:#fff;max-width:100%;
  }
  .ms-tag span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ms-tag svg{width:13px;height:13px;flex:none;}
  .ms-tag .x{
    display:grid;place-items:center;width:20px;height:20px;flex:none;
    border:none;border-radius:50%;background:rgba(255,255,255,.28);
    color:#fff;cursor:pointer;font-size:.9rem;line-height:1;padding:0;
  }
  .ms-tag .x:hover{background:rgba(255,255,255,.45);}
  #msInput{
    flex:1;min-width:120px;border:none;outline:none;background:transparent;
    font-family:'Nunito',sans-serif;font-size:1.02rem;font-weight:600;color:var(--ink);
    padding:6px 0;
  }
  #msInput::placeholder{color:#a8a299;font-weight:600;}
  .ms-chev{
    border:none;background:transparent;color:var(--ink-soft);cursor:pointer;
    width:32px;height:32px;display:grid;place-items:center;flex:none;border-radius:8px;
    transition:transform .2s;
  }
  .ms-wrap.open .ms-chev{transform:rotate(180deg);}
  .ms-chev svg{width:21px;height:21px;}

  .ms-list{
    position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:70;
    margin:0;padding:6px;list-style:none;max-height:340px;overflow-y:auto;
    background:#fff;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 8px 24px rgba(51,49,46,.16);
  }
  .ms-group{
    font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
    color:#a8a299;padding:8px 12px 4px;
  }
  .ms-opt{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
    cursor:pointer;
  }
  .ms-opt:hover,.ms-opt.active{background:var(--honey-soft);}
  .ms-opt[aria-selected="true"]{background:#f3efe6;}
  .ms-opt-ico{
    display:grid;place-items:center;width:32px;height:32px;border-radius:9px;flex:none;color:#fff;
  }
  .ms-opt-ico svg{width:18px;height:18px;}
  .ms-opt-txt{display:flex;flex-direction:column;line-height:1.2;min-width:0;flex:1;}
  .ms-opt-txt b{font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ms-opt-txt small{font-size:.8rem;color:#8a857d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ms-opt-check{width:20px;height:20px;flex:none;color:var(--green-deep);opacity:0;}
  .ms-opt[aria-selected="true"] .ms-opt-check{opacity:1;}
  .ms-empty{padding:16px 12px;color:#8a857d;font-weight:600;text-align:center;}

  /* ---------- Filter chips (i sticky header) ---------- */
  .filters{
    display:flex;gap:9px;overflow-x:auto;padding:11px 0 2px;
    max-width:1100px;margin:0 auto;
    scrollbar-width:none;-ms-overflow-style:none;
  }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:none;border:1px solid var(--line);background:#fff;
    border-radius:50px;padding:9px 16px;
    font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;
    color:var(--ink-soft);cursor:pointer;white-space:nowrap;
    transition:all .18s;display:flex;align-items:center;gap:7px;
  }
  .chip .dot{width:11px;height:11px;border-radius:50%;flex:none;}
  .chip[aria-pressed="true"]{
    color:#fff;border-color:transparent;
  }
  .chip[data-region="alle"][aria-pressed="true"]{background:var(--ink);}
  .chip[data-region="Storkøbenhavn"][aria-pressed="true"]{background:var(--deepblue);}
  .chip[data-region="Sjælland og øer"][aria-pressed="true"]{background:var(--green-deep);}
  .chip[data-region="Bornholm"][aria-pressed="true"]{background:var(--orange);}
  .chip[data-region="Fyn og øer"][aria-pressed="true"]{background:#c08a4a;color:#fff;}
  .chip[data-region="Jylland"][aria-pressed="true"]{background:var(--skyblue);}

  /* ---------- Count ---------- */
  .count{
    max-width:1100px;margin:14px auto 0;padding:0 18px;
    font-size:.9rem;font-weight:700;color:var(--ink-soft);
  }

  /* ---------- Grid ---------- */
  main{max-width:1100px;margin:0 auto;padding:14px 14px 40px;}
  .grid{
    display:grid;gap:16px;
    grid-template-columns:1fr;
  }
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:860px){.grid{grid-template-columns:1fr 1fr 1fr;}}

  .card{
    background:var(--card);border-radius:var(--radius);
    overflow:hidden;border:1px solid var(--line);
    box-shadow:0 2px 10px var(--shadow);
    display:flex;flex-direction:column;
    animation:pop .35s ease both;
  }
  @keyframes pop{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .card-img{
    position:relative;display:block;aspect-ratio:16/10;
    background:var(--sand);overflow:hidden;cursor:pointer;
    text-decoration:none;
  }
  .card-img .scene{width:100%;height:100%;display:block;transition:transform .25s;}
  .card-img:hover .scene{transform:scale(1.04);}
  .card-img:active{filter:brightness(.97);}
  .card-img:focus-visible{outline:3px solid var(--honey);outline-offset:-3px;}
  /* Lille "tryk for at åbne"-mærke nederst til højre på fotoet */
  .open-hint{
    position:absolute;right:11px;bottom:11px;
    display:inline-flex;align-items:center;gap:6px;
    background:var(--honey);color:#ffffff;
    border-radius:50px;padding:6px 12px 6px 11px;
    font-size:.8rem;font-weight:800;
    box-shadow:0 2px 6px rgba(0,0,0,.22);
  }
  .open-hint svg{width:16px;height:16px;flex:none;}
  .region-tag{
    position:absolute;top:11px;left:11px;
    background:rgba(255,255,255,.95);backdrop-filter:blur(4px);
    border-radius:50px;padding:5px 12px 5px 9px;
    font-size:.74rem;font-weight:800;color:var(--ink);
    display:flex;align-items:center;gap:6px;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .region-tag .dot{width:9px;height:9px;border-radius:50%;flex:none;}

  /* Type-mærke: ikon + ord, så stedet kan afkodes med ét blik */
  .type-tag{
    position:absolute;left:11px;bottom:11px;
    display:inline-flex;align-items:center;gap:7px;
    background:var(--tc);color:#fff;
    border-radius:50px;padding:6px 13px 6px 10px;
    font-size:.82rem;font-weight:800;letter-spacing:.01em;
    box-shadow:0 2px 6px rgba(0,0,0,.22);
  }
  .type-tag svg{width:18px;height:18px;flex:none;}

  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:11px;flex:1;}
  .card-title{
    font-family:'Baloo 2',cursive;font-weight:700;
    font-size:1.18rem;line-height:1.15;margin:0;color:var(--ink);
  }
  .card-addr{
    display:flex;align-items:flex-start;gap:6px;
    font-size:.85rem;color:var(--ink-soft);font-weight:600;margin-top:-4px;
  }
  .card-addr svg{width:15px;height:15px;flex:none;margin-top:2px;}
  .card-note{
    font-size:.8rem;font-weight:700;color:var(--orange);
    background:var(--orange-soft);border-radius:9px;padding:7px 10px;
  }
  .actions{display:flex;flex-direction:column;gap:9px;margin-top:auto;}
  .btn{
    display:flex;align-items:center;gap:10px;
    text-decoration:none;border-radius:12px;
    padding:13px 14px;font-family:'Nunito',sans-serif;
    font-weight:800;font-size:1rem;transition:transform .12s,filter .12s;
  }
  .btn:active{transform:scale(.97);}
  .btn svg{width:22px;height:22px;flex:none;}
  .btn-main{background:var(--honey);color:#ffffff;}
  .btn-main:hover{filter:brightness(1.03);}
  .btn-info{background:var(--mint);color:#163b35;}
  .btn-info:hover{filter:brightness(1.02);}
  .btn .arrow{margin-left:auto;opacity:.55;}

  /* ---------- Empty ---------- */
  .empty{
    grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink-soft);
  }
  .empty svg{width:64px;height:64px;opacity:.5;margin-bottom:12px;}
  .empty h3{font-family:'Baloo 2',cursive;margin:0 0 6px;color:var(--ink);font-size:1.3rem;}
  .empty p{margin:0;font-weight:600;}

  footer{
    text-align:center;padding:26px 20px 34px;color:var(--ink-soft);
    font-size:.8rem;font-weight:600;border-top:1px solid var(--line);
    background:var(--bg);
  }
  footer a{color:var(--green-deep);font-weight:800;}

  /* scroll-to-top */
  #top{
    position:fixed;right:16px;bottom:16px;z-index:60;
    width:50px;height:50px;border-radius:50%;border:none;
    background:var(--ink);color:#fff;cursor:pointer;
    display:none;place-items:center;box-shadow:0 4px 14px var(--shadow);
  }
  #top.show{display:grid;}
  #top svg{width:24px;height:24px;}
</style>
</head>

<header>
  <div class="brand">

      <ul class="ms-list" id="msList" role="listbox" aria-multiselectable="true" hidden></ul>

    <div class="filters" id="filters" role="group" aria-label="Vælg område"></div>
  </div>
</div>

<p class="count" id="count"></p>

<main>

</main>

<button id="top" aria-label="Til toppen">

<footer>

      <rect x="72" y="68" width="20" height="74" rx="2" fill="#9c7a44"/><rect x="72" y="68" width="6" height="74" fill="#b08a4c"/>
      <rect x="94" y="50" width="22" height="92" rx="2" fill="#a14536"/><rect x="94" y="50" width="7" height="92" fill="#b85542"/>
      <rect x="118" y="62" width="20" height="80" rx="2" fill="#4f6a4a"/><rect x="118" y="62" width="6" height="80" fill="#5f7c58"/>
      <rect x="140" y="56" width="20" height="86" rx="2" fill="#3a5670"/><rect x="140" y="56" width="6" height="86" fill="#496684"/>
    </g>
    <g fill="#ffffff22"><rect x="48" y="60" width="22" height="2"/><rect x="94" y="58" width="22" height="2"/><rect x="140" y="62" width="20" height="2"/></g>`}
};
function sceneSVG(t){
  const s = SCENES[t] || SCENES.museum;
  const sky = s.sky2
    ? `<defs><linearGradient id="sky_${t}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${s.sky}"/><stop offset="1" stop-color="${s.sky2}"/></linearGradient></defs><rect width="200" height="148" fill="url(#sky_${t})"/>`
    : `<rect width="200" height="148" fill="${s.sky}"/>`;
  return `<svg class="scene" viewBox="0 0 200 148" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    ${sky}${s.g}</svg>`;
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Build filter chips
const filtersEl = document.getElementById('filters');
REGIONS.forEach(r=>{
  const b=document.createElement('button');
  b.className='chip';b.dataset.region=r;
  b.setAttribute('aria-pressed', r==="alle"?"true":"false");
  const label = REGION_LABELS[r]||r;
  const dot = r==="alle" ? "" : `<span class="dot" style="background:${REGION_COLORS[r]}"></span>`;
  b.innerHTML = dot + esc(label);
  b.addEventListener('click',()=>{
    activeRegion=r;
    [...filtersEl.children].forEach(c=>c.setAttribute('aria-pressed', c.dataset.region===r?"true":"false"));
    render();
  });
  filtersEl.appendChild(b);
});

const grid=document.getElementById('grid');
const countEl=document.getElementById('count');

function cardHTML(pl){
  const color=REGION_COLORS[pl.r]||"#999";
  const note = pl.note ? `<div class="card-note">⚠️ ${esc(pl.note)}</div>` : "";
  return `<article class="card">
    <a class="card-img" href="${pl.p}" rel="noopener" aria-label="Åbn guide til ${esc(pl.n)}">
      ${sceneSVG(pl.t)}
      <span class="region-tag"><span class="dot" style="background:${color}"></span>${esc(pl.r)}</span>
      ${typeBadge(pl.t)}
    </a>
    <div class="card-body">
      <h2 class="card-title">${esc(pl.n)}</h2>
      <p class="card-addr">${ICON_PIN}<span>${esc(pl.a)}</span></p>
      ${note}
      <div class="actions">
        <a class="btn btn-main" href="${pl.p}" rel="noopener">${ICON_DOC}<span>Åbn guide</span>${ICON_ARROW}</a>
        <a class="btn btn-info" href="${pl.i}" rel="noopener">${ICON_INFO}<span>Praktisk info</span>${ICON_ARROW}</a>
      </div>
    </div>
  </article>`;
}

function render(){
  const selTypes  = selected.filter(s=>s.kind==="type").map(s=>s.value);
  const selPlaces = selected.filter(s=>s.kind==="place").map(s=>s.value);
  const list=PLACES.filter(pl=>{
    const okR = activeRegion==="alle" || pl.r===activeRegion;
    const okType  = selTypes.length===0  || selTypes.includes(pl.t);
    const okPlace = selPlaces.length===0 || selPlaces.includes(pl.n);
    return okR && okType && okPlace;
  });
  countEl.textContent = list.length===1 ? "1 sted" : `${list.length} steder`;
  if(list.length===0){
    grid.innerHTML=`<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <h3>Ingen steder fundet</h3>
      <p>Prøv et andet valg eller vælg “Alle steder”.</p>
    </div>`;
    return;
  }
  grid.innerHTML=list.map(cardHTML).join('');
}

/* ====== Multi-select typeahead ====== */
const msWrap   = document.getElementById('msWrap');
const msControl= document.getElementById('msControl');
const msTags   = document.getElementById('msTags');
const msInput  = document.getElementById('msInput');
const msChev   = document.getElementById('msChev');
const msList   = document.getElementById('msList');

// Byg alle valgmuligheder: typer (med antal) + alle steder
const MS_OPTIONS = (function(){
  const counts={};
  PLACES.forEach(pl=>{counts[pl.t]=(counts[pl.t]||0)+1;});
  const out=[];
  Object.keys(TYPES).forEach(k=>{
    if(!counts[k]) return;
    out.push({kind:"type", value:k, label:TYPES[k].label, sub:"Vis alle · "+counts[k]+" steder"});
  });
  PLACES.forEach(pl=>{
    out.push({kind:"place", value:pl.n, label:pl.n, sub:pl.a});
  });
  return out;
})();

let msOpen=false, msActiveIdx=-1, msFiltered=[];

function isSelected(o){ return selected.some(s=>s.kind===o.kind && s.value===o.value); }
function norm(s){ return s.toLowerCase()
  .replace(/æ/g,'ae').replace(/ø/g,'oe').replace(/å/g,'aa'); }

function svgStr(d,sw){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||2}" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;}
const CHECK = '<path d="M5 13l4 4L19 7"/>';

function renderTags(){
  msTags.innerHTML = selected.map((s,i)=>{
    if(s.kind==="type"){
      const ty=TYPES[s.value];
      return `<span class="ms-tag" style="background:${ty.color}">${svgStr(ty.icon,2)}<span>${ty.label}</span><button class="x" data-i="${i}" aria-label="Fjern ${ty.label}">✕</button></span>`;
    }
    return `<span class="ms-tag" style="background:#6f6a64"><span>${esc(s.value)}</span><button class="x" data-i="${i}" aria-label="Fjern ${esc(s.value)}">✕</button></span>`;
  }).join('');
  // placeholder skjules når der er valgte
  msInput.placeholder = selected.length ? "" : "Søg eller vælg type…";
}

function renderList(){
  const q = norm(msInput.value.trim());
  msFiltered = MS_OPTIONS.filter(o=>{
    if(!q) return true;
    return norm(o.label).includes(q) || (o.kind==="place" && norm(o.sub).includes(q));
  });
  if(msFiltered.length===0){
    msList.innerHTML = `<li class="ms-empty">Ingen forslag</li>`;
    return;
  }
  let html="", lastGroup="";
  msFiltered.forEach((o,idx)=>{
    const group = o.kind==="type" ? "Typer" : "Steder";
    if(group!==lastGroup){ html+=`<li class="ms-group" role="presentation">${group}</li>`; lastGroup=group; }
    const sel = isSelected(o);
    const ico = o.kind==="type"
      ? `<span class="ms-opt-ico" style="background:${TYPES[o.value].color}">${svgStr(TYPES[o.value].icon,2)}</span>`
      : `<span class="ms-opt-ico" style="background:#cfc6b8;color:#5a4f3f">${svgStr(ICON_PIN_D,2)}</span>`;
    html+=`<li class="ms-opt ${idx===msActiveIdx?'active':''}" role="option" aria-selected="${sel}" data-idx="${idx}">
      ${ico}
      <span class="ms-opt-txt"><b>${esc(o.label)}</b><small>${esc(o.sub)}</small></span>
      <svg class="ms-opt-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">${CHECK}</svg>
    </li>`;
  });
  msList.innerHTML = html;
}
const ICON_PIN_D = '<path d="M12 21s-7-5.2-7-10.5A7 7 0 0 1 19 10.5C19 15.8 12 21 12 21z"/><circle cx="12" cy="10.5" r="2.2"/>'; // pin-path til steder

function openList(){ msOpen=true; msWrap.classList.add('open'); msInput.setAttribute('aria-expanded','true'); msList.hidden=false; msActiveIdx=-1; renderList(); }
function closeList(){ msOpen=false; msWrap.classList.remove('open'); msInput.setAttribute('aria-expanded','false'); msList.hidden=true; }

function toggleOption(o){
  if(isSelected(o)) selected = selected.filter(s=>!(s.kind===o.kind && s.value===o.value));
  else selected.push({kind:o.kind, value:o.value});
  msInput.value="";
  renderTags(); renderList(); render();
  msInput.focus();
}

// Events
msControl.addEventListener('click', e=>{
  if(e.target.closest('.ms-tag')) return; // klik på chip håndteres separat
  msInput.focus(); if(!msOpen) openList();
});
msChev.addEventListener('click', e=>{ e.stopPropagation(); msOpen?closeList():(msInput.focus(),openList()); });
msInput.addEventListener('focus', ()=>{ if(!msOpen) openList(); });
msInput.addEventListener('input', ()=>{ if(!msOpen) openList(); msActiveIdx=-1; renderList(); });

msTags.addEventListener('click', e=>{
  const btn=e.target.closest('.x'); if(!btn) return;
  e.stopPropagation();
  selected.splice(+btn.dataset.i,1);
  renderTags(); renderList(); render(); msInput.focus();
});

msList.addEventListener('mousedown', e=>{
  const li=e.target.closest('.ms-opt'); if(!li) return;
  e.preventDefault();
  toggleOption(msFiltered[+li.dataset.idx]);
});

msInput.addEventListener('keydown', e=>{
  if(e.key==="ArrowDown"){ e.preventDefault(); if(!msOpen)openList(); msActiveIdx=Math.min(msActiveIdx+1,msFiltered.length-1); renderList(); scrollActive(); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); msActiveIdx=Math.max(msActiveIdx-1,0); renderList(); scrollActive(); }
  else if(e.key==="Enter"){ e.preventDefault(); if(msActiveIdx>=0&&msFiltered[msActiveIdx]) toggleOption(msFiltered[msActiveIdx]); }
  else if(e.key==="Escape"){ closeList(); }
  else if(e.key==="Backspace" && msInput.value==="" && selected.length){ selected.pop(); renderTags(); renderList(); render(); }
});
function scrollActive(){
  const el=msList.querySelector('.ms-opt.active'); if(el) el.scrollIntoView({block:"nearest"});
}

document.addEventListener('click', e=>{ if(!msWrap.contains(e.target)) closeList(); });

renderTags();


// scroll-to-top
const topBtn=document.getElementById('top');
window.addEventListener('scroll',()=>{
  topBtn.classList.toggle('show', window.scrollY>500);
},{passive:true});
topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

render();

// Registrer service worker (virker kun når appen ligger online, ikke fra en løs fil)
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

</script>
</body>
</html>
